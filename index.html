<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        /* Адаптируем цвета под текущую тему Telegram (светлая/темная) */
        body {
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .bg-secondary { background-color: var(--tg-theme-secondary-bg-color, #2d2d2d); }
        
        /* Стили для пузырей */
        #bubbles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px 10px;
        }
        .bubble {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .bubble:active { transform: scale(0.95); }
        .bubble-up { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); }
        .bubble-down { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
        
        /* Модальное окно графика */
        #chart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--tg-theme-bg-color, #1e1e1e);
            z-index: 50;
            flex-direction: column;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="flex justify-between p-4 bg-secondary shadow-md shrink-0">
        <button id="btn-list" class="w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500">Топ 20</button>
        <button id="btn-bubbles" class="w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent">Пузыри</button>
    </div>

    <div class="flex-1 overflow-y-auto">
        <div id="list-view" class="p-4 space-y-3">
            <div id="loading" class="text-center text-gray-400 mt-10">Загрузка данных...</div>
            <div id="coins-list"></div>
        </div>

        <div id="bubbles-view" class="hidden h-full flex items-center justify-center overflow-hidden">
            <div id="bubbles-container"></div>
        </div>
    </div>

    <div id="chart-modal">
        <div class="flex justify-between items-center p-4 bg-secondary shrink-0">
            <h2 id="chart-title" class="font-bold text-lg">График</h2>
            <button id="close-chart" class="px-4 py-2 bg-gray-600 rounded-lg text-white">Назад</button>
        </div>
        <div id="tv_chart_container" class="flex-1 w-full"></div>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.ready();

        let coinsData = [];

        // Переключение вкладок
        const btnList = document.getElementById('btn-list');
        const btnBubbles = document.getElementById('btn-bubbles');
        const viewList = document.getElementById('list-view');
        const viewBubbles = document.getElementById('bubbles-view');

        btnList.onclick = () => {
            viewList.classList.remove('hidden');
            viewBubbles.classList.add('hidden');
            btnList.className = "w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500";
            btnBubbles.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent";
            tg.HapticFeedback.impactOccurred('light');
        };

        btnBubbles.onclick = () => {
            viewBubbles.classList.remove('hidden');
            viewList.classList.add('hidden');
            btnBubbles.className = "w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500";
            btnList.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent";
            tg.HapticFeedback.impactOccurred('light');
        };

        // Форматирование цен
        const formatPrice = (price) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(price);

        // Получение данных с CoinGecko
        async function fetchCoins() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false');
                coinsData = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderList();
                renderBubbles();
            } catch (error) {
                document.getElementById('loading').innerText = 'Ошибка загрузки данных API';
            }
        }

        // Отрисовка списка
        function renderList() {
            const listContainer = document.getElementById('coins-list');
            listContainer.innerHTML = '';
            
            coinsData.forEach((coin, index) => {
                const isUp = coin.price_change_percentage_24h >= 0;
                const colorClass = isUp ? 'text-green-500' : 'text-red-500';
                const arrow = isUp ? '▲' : '▼';

                const el = document.createElement('div');
                el.className = "flex justify-between items-center p-3 bg-secondary rounded-lg cursor-pointer";
                el.onclick = () => openChart(coin.symbol);
                el.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-gray-500 font-bold w-4">${index + 1}</span>
                        <img src="${coin.image}" alt="${coin.name}" class="w-8 h-8 rounded-full">
                        <div>
                            <div class="font-bold">${coin.symbol.toUpperCase()}</div>
                            <div class="text-xs text-gray-400">${coin.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold">${formatPrice(coin.current_price)}</div>
                        <div class="text-xs ${colorClass}">${arrow} ${Math.abs(coin.price_change_percentage_24h).toFixed(2)}%</div>
                    </div>
                `;
                listContainer.appendChild(el);
            });
        }

        // Отрисовка пузырей
        function renderBubbles() {
            const container = document.getElementById('bubbles-container');
            container.innerHTML = '';
            
            // Находим макс и мин капитализацию для расчета размеров (от 50px до 120px)
            const maxCap = Math.max(...coinsData.map(c => c.market_cap));
            const minCap = Math.min(...coinsData.map(c => c.market_cap));

            coinsData.forEach(coin => {
                const isUp = coin.price_change_percentage_24h >= 0;
                
                // Нормализация размера от 0 до 1, затем масштабирование
                let scale = (coin.market_cap - minCap) / (maxCap - minCap);
                // Делаем шкалу чуть более логарифмической, чтобы биток не занимал весь экран
                scale = Math.pow(scale, 0.4); 
                const size = 50 + (scale * 80); // Размер от 50px до 130px

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isUp ? 'bubble-up' : 'bubble-down'}`;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.onclick = () => openChart(coin.symbol);
                
                bubble.innerHTML = `
                    <span class="text-sm shadow-sm">${coin.symbol.toUpperCase()}</span>
                    <span class="text-[10px] opacity-80" style="display: ${size > 70 ? 'block' : 'none'}">${isUp ? '+' : ''}${coin.price_change_percentage_24h.toFixed(1)}%</span>
                `;
                container.appendChild(bubble);
            });
        }

        // Работа с графиком TradingView
        const modal = document.getElementById('chart-modal');
        const closeBtn = document.getElementById('close-chart');
        let tvWidget = null;

        function openChart(symbol) {
            tg.HapticFeedback.impactOccurred('medium');
            const ticker = `BINANCE:${symbol.toUpperCase()}USDT`; // Пытаемся взять пару к USDT с Binance
            
            document.getElementById('chart-title').innerText = ticker;
            modal.style.display = 'flex';

            // Очищаем старый график
            document.getElementById('tv_chart_container').innerHTML = '';

            // Создаем новый виджет
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": ticker,
                "interval": "60", // Часовик по умолчанию
                "timezone": "Europe/Moscow",
                "theme": tg.colorScheme === 'dark' ? 'dark' : 'light', // Тема зависит от Telegram
                "style": "1", // Японские свечи
                "locale": "ru",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tv_chart_container"
            });
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            document.getElementById('tv_chart_container').innerHTML = ''; // Убиваем виджет для экономии памяти
        };

        // Запуск
        fetchCoins();
    </script>
</body>
</html>
