<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .bg-secondary { background-color: var(--tg-theme-secondary-bg-color, #2d2d2d); }
        
        /* Стили для пузырей */
        #bubbles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 20px 10px;
        }
        .bubble {
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .bubble:active { transform: scale(0.95); }
        .bubble-up { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); }
        .bubble-down { background: radial-gradient(circle at 30% 30%, #f87171, #dc2626); }
        
        #chart-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--tg-theme-bg-color, #1e1e1e);
            z-index: 50;
            flex-direction: column;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="flex justify-between p-4 bg-secondary shadow-md shrink-0">
        <button id="btn-list" class="w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500">Топ 20</button>
        <button id="btn-bubbles" class="w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent">Пузыри</button>
    </div>

    <div class="flex-1 overflow-y-auto pb-4">
        <div id="list-view" class="w-full">
            <div id="loading" class="text-center text-gray-400 mt-10">Загрузка данных...</div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse hidden" id="crypto-table">
                    <thead class="text-xs text-gray-400 uppercase bg-secondary sticky top-0">
                        <tr>
                            <th class="p-3 font-medium">Монета</th>
                            <th class="p-3 font-medium text-right">Цена</th>
                            <th class="p-3 font-medium text-center">1 ч</th>
                            <th class="p-3 font-medium text-center">24 ч</th>
                            <th class="p-3 font-medium text-center">7 д</th>
                        </tr>
                    </thead>
                    <tbody id="coins-table-body" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="bubbles-view" class="hidden h-full flex items-center justify-center overflow-hidden">
            <div id="bubbles-container"></div>
        </div>
    </div>

    <div id="chart-modal">
        <div class="flex justify-between items-center p-4 bg-secondary shrink-0">
            <h2 id="chart-title" class="font-bold text-lg">График</h2>
            <button id="close-chart" class="px-4 py-2 bg-gray-600 rounded-lg text-white font-medium">Назад</button>
        </div>
        <div id="tv_chart_container" class="flex-1 w-full"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let coinsData = [];

        const btnList = document.getElementById('btn-list');
        const btnBubbles = document.getElementById('btn-bubbles');
        const viewList = document.getElementById('list-view');
        const viewBubbles = document.getElementById('bubbles-view');

        btnList.onclick = () => {
            viewList.classList.remove('hidden');
            viewBubbles.classList.add('hidden');
            btnList.className = "w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500";
            btnBubbles.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent";
            tg.HapticFeedback.impactOccurred('light');
        };

        btnBubbles.onclick = () => {
            viewBubbles.classList.remove('hidden');
            viewList.classList.add('hidden');
            btnBubbles.className = "w-1/2 py-2 font-bold text-blue-500 border-b-2 border-blue-500";
            btnList.className = "w-1/2 py-2 font-bold text-gray-400 border-b-2 border-transparent";
            tg.HapticFeedback.impactOccurred('light');
        };

        const formatPrice = (price) => {
            // Убираем лишние нули для дорогих монет, оставляем больше для дешевых
            let fractionDigits = price < 1 ? 4 : 2;
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: fractionDigits, maximumFractionDigits: fractionDigits }).format(price);
        };

        const formatPercent = (val) => {
            if (val == null) return "-";
            return (val > 0 ? "+" : "") + val.toFixed(1) + "%";
        };

        // Логика закрашивания ячеек
        const getCellColor = (val) => {
            if (val == null || val === 0) return "bg-gray-600 text-white";
            return val > 0 ? "bg-green-600 text-white" : "bg-red-600 text-white";
        };

        async function fetchCoins() {
            try {
                // Добавили параметр price_change_percentage=1h,24h,7d в запрос API
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=1h,24h,7d');
                coinsData = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('crypto-table').classList.remove('hidden');
                
                renderTable();
                renderBubbles();
            } catch (error) {
                document.getElementById('loading').innerText = 'Ошибка загрузки данных API';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('coins-table-body');
            tbody.innerHTML = '';
            
            coinsData.forEach((coin, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-700/50 cursor-pointer active:bg-gray-800 transition";
                tr.onclick = () => openChart(coin.symbol);

                // Получаем изменения цены
                const p1h = coin.price_change_percentage_1h_in_currency;
                const p24h = coin.price_change_percentage_24h_in_currency;
                const p7d = coin.price_change_percentage_7d_in_currency;

                tr.innerHTML = `
                    <td class="p-3 flex items-center gap-2">
                        <img src="${coin.image}" class="w-6 h-6 rounded-full shrink-0">
                        <div>
                            <div class="font-bold leading-tight">${coin.symbol.toUpperCase()}</div>
                        </div>
                    </td>
                    <td class="p-3 text-right font-semibold">
                        ${formatPrice(coin.current_price)}
                    </td>
                    <td class="p-1 border-l border-gray-800/50">
                        <div class="rounded p-1.5 text-center text-xs font-medium ${getCellColor(p1h)}">
                            ${formatPercent(p1h)}
                        </div>
                    </td>
                    <td class="p-1 border-l border-gray-800/50">
                        <div class="rounded p-1.5 text-center text-xs font-medium ${getCellColor(p24h)}">
                            ${formatPercent(p24h)}
                        </div>
                    </td>
                    <td class="p-1 border-l border-gray-800/50">
                        <div class="rounded p-1.5 text-center text-xs font-medium ${getCellColor(p7d)}">
                            ${formatPercent(p7d)}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function renderBubbles() {
            const container = document.getElementById('bubbles-container');
            container.innerHTML = '';
            
            const maxCap = Math.max(...coinsData.map(c => c.market_cap));
            const minCap = Math.min(...coinsData.map(c => c.market_cap));

            coinsData.forEach(coin => {
                const isUp = coin.price_change_percentage_24h >= 0;
                let scale = (coin.market_cap - minCap) / (maxCap - minCap);
                scale = Math.pow(scale, 0.4); 
                const size = 50 + (scale * 80);

                const bubble = document.createElement('div');
                bubble.className = `bubble ${isUp ? 'bubble-up' : 'bubble-down'}`;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.onclick = () => openChart(coin.symbol);
                
                bubble.innerHTML = `
                    <span class="text-sm shadow-sm">${coin.symbol.toUpperCase()}</span>
                    <span class="text-[10px] opacity-80" style="display: ${size > 70 ? 'block' : 'none'}">${isUp ? '+' : ''}${coin.price_change_percentage_24h.toFixed(1)}%</span>
                `;
                container.appendChild(bubble);
            });
        }

        const modal = document.getElementById('chart-modal');
        const closeBtn = document.getElementById('close-chart');
        let tvWidget = null;

        function openChart(symbol) {
            tg.HapticFeedback.impactOccurred('medium');
            const ticker = `BINANCE:${symbol.toUpperCase()}USDT`; 
            
            document.getElementById('chart-title').innerText = ticker;
            modal.style.display = 'flex';

            document.getElementById('tv_chart_container').innerHTML = '';

            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": ticker,
                "interval": "60",
                "timezone": "Europe/Moscow",
                "theme": tg.colorScheme === 'dark' ? 'dark' : 'light',
                "style": "1",
                "locale": "ru",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tv_chart_container"
            });
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            document.getElementById('tv_chart_container').innerHTML = ''; 
        };

        fetchCoins();
    </script>
</body>
</html>
